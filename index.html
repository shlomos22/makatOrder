<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AssetMap Pro | Grid & Drag</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff; --bg-dark: #0a0c14; --bg-panel: #161b2a;
            --text-main: #e6edf3; --text-muted: #8b949e; --danger: #ff4d4d;
            --glass-border: rgba(255, 255, 255, 0.1); --transition: all 0.2s ease;
        }

        body {
            font-family: 'Heebo', sans-serif; margin: 0; background-color: var(--bg-dark);
            color: var(--text-main); height: 100vh; overflow: hidden; touch-action: manipulation;
        }

        /* מסך לובי */
        #lobby {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; gap: 30px; padding: 20px; box-sizing: border-box;
        }

        .room-grid-lobby {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px; width: 100%; max-width: 900px;
        }

        .room-card {
            background: var(--bg-panel); padding: 30px; border-radius: 20px;
            border: 1px solid var(--glass-border); cursor: pointer; transition: var(--transition);
            text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .room-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 0 25px rgba(0, 242, 255, 0.15); }

        /* מסך חדר */
        #room-view { display: none; height: 100vh; flex-direction: column; }

        #top-bar {
            height: 65px; background: rgba(22, 27, 42, 0.95); display: flex; align-items: center;
            justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--glass-border);
            backdrop-filter: blur(10px); z-index: 50;
        }

        /* הטבלה - הגריד */
        #grid-container {
            flex: 1; overflow: auto; padding: 30px;
            display: grid; gap: 6px; justify-content: center; align-content: start;
            user-select: none; -webkit-user-select: none;
        }

        .grid-cell {
            width: 85px; height: 85px; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05); border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative; transition: background 0.2s, transform 0.1s;
        }

        .grid-cell.occupied { background: #1c2135; border-color: var(--glass-border); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .grid-cell.dragging { opacity: 0.5; transform: scale(0.9); border: 2px dashed var(--primary); z-index: 100; }
        .grid-cell.drop-target { background: rgba(0, 242, 255, 0.15) !important; border: 2px solid var(--primary) !important; }

        .cell-icon { font-size: 26px; margin-bottom: 4px; pointer-events: none; }
        .cell-label { font-size: 10px; font-weight: 800; color: var(--primary); text-align: center; pointer-events: none; }

        /* מודאלים */
        .modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--bg-panel); padding: 25px; border-radius: 24px;
            z-index: 1000; width: 330px; border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.7);
        }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 999; }

        label { display: block; margin-top: 10px; font-size: 0.85rem; color: var(--text-muted); }
        input, select, textarea {
            width: 100%; padding: 12px; margin: 5px 0; background: #0a0c14; border: 1px solid var(--glass-border);
            color: white; border-radius: 10px; font-family: inherit; box-sizing: border-box; font-size: 15px;
        }

        .btn { padding: 12px 20px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; transition: var(--transition); font-family: inherit; }
        .btn-primary { background: var(--primary); color: #000; width: 100%; margin-top: 15px; }
        .btn-secondary { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--glass-border); }
        .btn-danger { background: var(--danger); color: white; width: 100%; margin-top: 8px; }

        .header-btns { display: flex; gap: 8px; }
    </style>
</head>
<body>

<div id="lobby">
    <h1 style="font-weight: 900; margin:0">AssetMap <span style="color:var(--primary)">Latrun</span></h1>
    <div class="room-grid-lobby" id="lobby-rooms">
        <div class="room-card" onclick="enterRoom('חמ\'ל רבצ\'ר')"><h3>חמ"ל רבצ"ר</h3></div>
        <div class="room-card" onclick="enterRoom('חד\'ן רבצ\'ר')"><h3>חד"ן רבצ"ר</h3></div>
        <div class="room-card" onclick="enterRoom('מכלול תאים')"><h3>מכלול תאים</h3></div>
        <div class="room-card" onclick="enterRoom('מאנ\'ח')"><h3>מאנ"ח</h3></div>
        <div class="room-card" onclick="enterRoom('תר\'ח לטרון')"><h3>תר"ח לטרון</h3></div>
        <div class="room-card" onclick="enterRoom('תר\'ח לאומי')"><h3>תר"ח לאומי</h3></div>
    </div>
</div>

<div id="room-view">
    <div id="top-bar">
        <button onclick="showLobby()" class="btn btn-secondary">← חזרה</button>
        <h3 id="room-title" style="margin:0; color:var(--primary)"></h3>
        <div class="header-btns">
            <button id="sync-btn" onclick="manualSync()" class="btn btn-secondary">סנכרון 🔄</button>
            <button onclick="openSettings()" class="btn btn-secondary">⚙️</button>
        </div>
    </div>
    <div id="grid-container"></div>
</div>

<div id="overlay" class="overlay" onclick="closeModals()"></div>

<div id="settings-modal" class="modal">
    <h3 style="margin-top:0">הגדרות חדר ומלאי</h3>
    <label>ממדי הטבלה (שורות x עמודות)</label>
    <div style="display: flex; gap: 10px;">
        <input type="number" id="set-rows" placeholder="שורות">
        <input type="number" id="set-cols" placeholder="עמודות">
    </div>
    <hr style="border:0; border-top:1px solid var(--glass-border); margin:15px 0;">
    <label>ניהול מלאי מק"טים (גלובלי)</label>
    <select id="inv-type-select" onchange="loadInventoryText()">
        <option value="PC">PC (מארזים)</option>
        <option value="MONITOR">MONITOR (מסכים)</option>
        <option value="TV">TV (טלוויזיות)</option>
        <option value="PRINTER">PRINTER (מדפסות)</option>
        <option value="UC">UC (טלפוניה)</option>
    </select>
    <textarea id="inv-text-area" rows="5" placeholder="הכנס מקטים מופרדים בפסיקים..."></textarea>
    <button class="btn btn-primary" onclick="saveSettings()">שמור הגדרות</button>
</div>

<div id="asset-modal" class="modal">
    <h3 id="asset-modal-title" style="margin-top:0">הגדרת עמדה</h3>
    <label>שם עמדה / תפקיד</label>
    <input type="text" id="asset-name" placeholder="לדוגמא: קמב''ץ">
    
    <label>סוג ציוד</label>
    <select id="asset-type" onchange="updateSkuDropdowns()">
        <option value="STATION">💻 תחנת עבודה (PC + מסך)</option>
        <option value="PC">🖥️ PC עצמאי</option>
        <option value="MONITOR">📺 מסך עצמאי</option>
        <option value="PRINTER">🖨️ מדפסת</option>
        <option value="TV">📡 טלוויזיה</option>
        <option value="UC">📞 טלפון UC</option>
    </select>

    <div id="sku-selection-area">
        <div id="pc-sku-div">
            <label id="pc-label">מק"ט מחשב</label>
            <select id="main-sku-select"></select>
        </div>
        <div id="mon-sku-div">
            <label>מק"ט מסך</label>
            <select id="mon-sku-select"></select>
        </div>
    </div>

    <div id="delete-area" style="display:none; margin-top:15px; border-top:1px solid var(--glass-border); padding-top:10px;">
        <button class="btn btn-danger" onclick="deleteAsset()">מחק עמדה 🗑️</button>
    </div>

    <button class="btn btn-primary" onclick="saveAsset()">שמור עמדה</button>
    <button class="btn btn-secondary" style="width:100%; margin-top:8px" onclick="closeModals()">ביטול</button>
</div>

<script>
    // --- הגדרות ומשתנים ---
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyhSXO_Xw0MaB4U2aCdLrPHeo9ez6UJSG-xNVwGyR8JxoKJrCWK_7s9F1uAY2MXuJ3tRQ/exec";

    let db = {
        rooms: {}, 
        inventory: { PC: [], MONITOR: [], TV: [], PRINTER: [], UC: [] }
    };
    let currentRoom = "";
    let selectedCell = null;
    let dragSource = null;
    let pressTimer = null;

    async function init() {
        const saved = localStorage.getItem('assetMap_Latrun_Final');
        if (saved) db = JSON.parse(saved);
        renderLobby(); // נרנדר קודם את הלובי מהזכרון המקומי

        if (SCRIPT_URL !== "הכנס_כאן_את_הכתובת_שלך") {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                if (data && data.rooms) { 
                    db = data; 
                    saveLocal(); 
                    renderGrid(); 
                }
            } catch(e) { console.warn("Offline Mode or Script URL issue"); }
        }
    }

    function showLobby() {
        document.getElementById('room-view').style.display = 'none';
        document.getElementById('lobby').style.display = 'flex';
    }

    function enterRoom(name) {
        currentRoom = name;
        document.getElementById('room-title').innerText = name;
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('room-view').style.display = 'flex';
        if (!db.rooms[name]) db.rooms[name] = { rows: 6, cols: 8, assets: {} };
        renderGrid();
    }

    function renderGrid() {
        if (!currentRoom) return;
        const room = db.rooms[currentRoom];
        const container = document.getElementById('grid-container');
        container.style.gridTemplateColumns = `repeat(${room.cols}, 85px)`;
        container.innerHTML = '';

        for (let r = 0; r < room.rows; r++) {
            for (let c = 0; c < room.cols; c++) {
                const cellId = `${r}-${c}`;
                const asset = room.assets[cellId];
                const cell = document.createElement('div');
                cell.className = 'grid-cell' + (asset ? ' occupied' : '');
                cell.id = `cell-${cellId}`;
                cell.dataset.id = cellId;

                if (asset) {
                    const icons = {STATION:'💻', PC:'🖥️', MONITOR:'📺', PRINTER:'🖨️', TV:'📡', UC:'📞'};
                    cell.innerHTML = `<span class="cell-icon">${icons[asset.type] || '❓'}</span><span class="cell-label">${asset.name}</span>`;
                }

                let isLongPress = false;
                const onStart = (e) => {
                    isLongPress = false;
                    if (asset) {
                        pressTimer = setTimeout(() => {
                            isLongPress = true;
                            startDragging(cellId);
                        }, 550);
                    }
                };
                const onEnd = (e) => {
                    clearTimeout(pressTimer);
                    if (!isLongPress && !dragSource) {
                        openAssetModal(cellId);
                    }
                };

                cell.onmousedown = onStart;
                cell.ontouchstart = (e) => onStart(e);
                cell.onmouseup = onEnd;
                cell.ontouchend = (e) => onEnd(e);
                container.appendChild(cell);
            }
        }
    }

    function startDragging(cellId) {
        dragSource = cellId;
        document.getElementById(`cell-${cellId}`).classList.add('dragging');
        document.querySelectorAll('.grid-cell').forEach(c => {
            c.onmouseenter = () => { if(dragSource) c.classList.add('drop-target'); };
            c.onmouseleave = () => { c.classList.remove('drop-target'); };
            c.onclick = (e) => {
                if (dragSource) {
                    e.stopPropagation();
                    finalizeMove(c.dataset.id);
                }
            };
        });
    }

    function finalizeMove(targetId) {
        if (dragSource && dragSource !== targetId) {
            const asset = db.rooms[currentRoom].assets[dragSource];
            delete db.rooms[currentRoom].assets[dragSource];
            db.rooms[currentRoom].assets[targetId] = asset;
            saveLocal();
            manualSync();
        }
        dragSource = null;
        renderGrid();
    }

    function loadInventoryText() {
        const type = document.getElementById('inv-type-select').value;
        document.getElementById('inv-text-area').value = (db.inventory[type] || []).join(', ');
    }

    function openSettings() {
        const room = db.rooms[currentRoom];
        document.getElementById('set-rows').value = room.rows;
        document.getElementById('set-cols').value = room.cols;
        loadInventoryText();
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('settings-modal').style.display = 'block';
    }

    function saveSettings() {
        const room = db.rooms[currentRoom];
        room.rows = parseInt(document.getElementById('set-rows').value) || 5;
        room.cols = parseInt(document.getElementById('set-cols').value) || 5;
        const type = document.getElementById('inv-type-select').value;
        db.inventory[type] = document.getElementById('inv-text-area').value.split(',').map(s => s.trim()).filter(s => s);
        saveLocal(); renderGrid(); closeModals(); manualSync();
    }

    function openAssetModal(cellId) {
        selectedCell = cellId;
        const asset = db.rooms[currentRoom].assets[cellId];
        document.getElementById('asset-name').value = asset ? asset.name : "";
        document.getElementById('asset-type').value = asset ? asset.type : "STATION";
        updateSkuDropdowns(asset ? asset.sku : null, asset ? asset.monSku : null);
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('asset-modal').style.display = 'block';
    }

    function updateSkuDropdowns(sSku = null, sMon = null) {
        const type = document.getElementById('asset-type').value;
        const mainSel = document.getElementById('main-sku-select');
        const monSel = document.getElementById('mon-sku-select');
        const pcDiv = document.getElementById('pc-sku-div');
        const monDiv = document.getElementById('mon-sku-div');
        const pcLabel = document.getElementById('pc-label');

        mainSel.innerHTML = monSel.innerHTML = '<option value="">-- ללא --</option>';
        pcDiv.style.display = 'none'; monDiv.style.display = 'none';

        if (type === 'STATION') {
            pcDiv.style.display = 'block'; monDiv.style.display = 'block';
            pcLabel.innerText = 'מק"ט PC';
            (db.inventory.PC || []).forEach(s => mainSel.add(new Option(s, s, false, s === sSku)));
            (db.inventory.MONITOR || []).forEach(s => monSel.add(new Option(s, s, false, s === sMon)));
        } else if (type === 'PC') {
            pcDiv.style.display = 'block'; pcLabel.innerText = 'מק"ט PC';
            (db.inventory.PC || []).forEach(s => mainSel.add(new Option(s, s, false, s === sSku)));
        } else if (type === 'MONITOR' || type === 'TV') {
            monDiv.style.display = 'block';
            const src = type === 'MONITOR' ? db.inventory.MONITOR : db.inventory.TV;
            (src || []).forEach(s => monSel.add(new Option(s, s, false, s === sMon)));
        } else {
            pcDiv.style.display = 'block'; pcLabel.innerText = 'מק"ט ' + type;
            (db.inventory[type] || []).forEach(s => mainSel.add(new Option(s, s, false, s === sSku)));
        }
    }

    function saveAsset() {
        const nameInput = document.getElementById('asset-name');
        if (!nameInput.value.trim()) return alert("חובה להזין שם עמדה");
        
        const type = document.getElementById('asset-type').value;
        db.rooms[currentRoom].assets[selectedCell] = {
            name: nameInput.value.trim(),
            type: type,
            sku: document.getElementById('main-sku-select').value,
            monSku: document.getElementById('mon-sku-select').value
        };

        saveLocal(); 
        renderGrid(); 
        closeModals(); 
        manualSync(); // יתבצע ברקע
    }

    function deleteAsset() {
        if (confirm("למחוק את העמדה?")) {
            delete db.rooms[currentRoom].assets[selectedCell];
            saveLocal(); renderGrid(); closeModals(); manualSync();
        }
    }

    function saveLocal() { localStorage.setItem('assetMap_Latrun_Final', JSON.stringify(db)); }
    function closeModals() { document.querySelectorAll('.modal, .overlay').forEach(e => e.style.display = 'none'); }

    async function manualSync() {
        if (SCRIPT_URL === "הכנס_כאן_את_הכתובת_שלך") return;
        const btn = document.getElementById('sync-btn');
        btn.innerText = "...";
        try {
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(db) });
            btn.innerText = "סונכרן ✅";
        } catch(e) { btn.innerText = "שגיאה ❌"; }
        setTimeout(() => btn.innerText = "סנכרון 🔄", 2000);
    }

    window.onload = init; // מבטיח שהקוד ירוץ כשהדף נטען
</script>    
</body>
</html>
